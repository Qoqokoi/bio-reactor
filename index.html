<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Bioreaktor - Terintegrasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans p-6">

    <div class="max-w-4xl mx-auto">
        <h1 id="secret-trigger" class="text-3xl font-bold border-b border-gray-700 pb-4 mb-6 text-green-400 cursor-default select-none">
            NOC Bioreaktor Terintegrasi
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 text-center">
                <h2 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Suhu Inti</h2>
                <p id="ui-suhu" class="text-5xl font-bold text-yellow-400">-- °C</p>
            </div>
            
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 text-center">
                <h2 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Kadar Amonia</h2>
                <p id="ui-amonia" class="text-5xl font-bold text-red-400">-- PPM</p>
            </div>

            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 text-center">
                <h2 class="text-gray-400 text-sm uppercase tracking-wider mb-2">Durasi</h2>
                <p id="ui-hari" class="text-5xl font-bold text-blue-400">-- Hari</p>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg border border-green-700 mb-8">
            <h2 class="text-xl font-bold mb-4 text-green-400">Decision Support System (SAW)</h2>
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-gray-400">Skor Preferensi (V): <span id="ui-skor" class="text-white font-mono text-lg">0.00</span></p>
                </div>
                <div id="ui-keputusan" class="text-xl font-black bg-gray-700 px-6 py-3 rounded text-gray-400">
                    MENUNGGU AUTENTIKASI...
                </div>
            </div>
        </div>

        <div id="override-panel" class="hidden bg-red-900/30 p-6 rounded-lg border border-red-700 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-red-400">Manual Override</h2>
                <p class="text-gray-400 text-sm">kendali paksa dari jauh. gunakan saat darurat atau sebelum maintenance.</p>
            </div>
            <button id="btn-override" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded transition-all">
                EKSEKUSI AERASI
            </button>
        </div>
    </div>

  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5Ad_UGPVF9AjVZNI4HtajNJmd1F1Vxhg",
            authDomain: "bio-reactor-6d074.firebaseapp.com",
            databaseURL: "https://bio-reactor-6d074-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bio-reactor-6d074"
        };

        const authEmail = "admin@versenate.com";
        const authPassword = "adm098";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        signInWithEmailAndPassword(auth, authEmail, authPassword)
            .then(() => {
                console.log("Firebase Terotentikasi. Membuka enkripsi data.");
                document.getElementById('ui-keputusan').innerText = "MENUNGGU DATA FIELD...";
                bukaPipaDataRealtime();
            })
            .catch((error) => {
                console.error("Akses Ditolak Firewall:", error.message);
                document.getElementById('ui-keputusan').innerText = "AKSES DITOLAK (401)";
                document.getElementById('ui-keputusan').className = "text-xl font-black bg-red-700 text-white px-6 py-3 rounded";
            });

        let sensorTimeout;

        function bukaPipaDataRealtime() {
            const sensorRef = ref(db, 'sensor');
            onValue(sensorRef, (snapshot) => {
                clearTimeout(sensorTimeout);

                const data = snapshot.val();
                if(data) {
                    let s = parseFloat(data.suhu);
                    let a = parseFloat(data.amonia);
                    let h = parseInt(data.hari_ke);

                    document.getElementById('ui-suhu').innerText = s + " °C";
                    document.getElementById('ui-amonia').innerText = a + " PPM";
                    document.getElementById('ui-hari').innerText = h + " Hari";

                    hitungSAW(s, a, h);
                }

                sensorTimeout = setTimeout(() => {
                    document.getElementById('ui-keputusan').innerText = "KONEKSI SENSOR TERPUTUS (OFFLINE)";
                    document.getElementById('ui-keputusan').className = "text-xl font-black bg-gray-600 text-white px-6 py-3 rounded";
                    document.getElementById('ui-skor').innerText = "---";
                }, 30000);
            });

            initToggleOverride();
        }

        function hitungSAW(suhu, amonia, hari) {
            const MAX_AMONIA = 50.0;
            const OPTIMAL_SUHU_MAX = 70.0;
            const MAX_HARI = 14.0;

            const uiKeputusan = document.getElementById('ui-keputusan');
            const uiSkor = document.getElementById('ui-skor');
            if (suhu > OPTIMAL_SUHU_MAX || amonia > MAX_AMONIA) {
                uiKeputusan.innerText = "PROSES GAGAL / OVERHEAT";
                uiKeputusan.className = "text-xl font-black bg-red-600 text-white px-6 py-3 rounded animate-pulse";
                uiSkor.innerText = "---";
                return;
            }

            let r_suhu = suhu / OPTIMAL_SUHU_MAX; 
            let r_amonia = (MAX_AMONIA - amonia) / MAX_AMONIA;
              if (r_amonia < 0) r_amonia = 0; 
            let r_hari = hari / MAX_HARI;
              if (r_hari > 1) r_hari = 1.0;
            let v = (r_suhu * 0.3) + (r_amonia * 0.4) + (r_hari * 0.3);
              uiSkor.innerText = v.toFixed(3);

            if (v >= 0.75) {
                uiKeputusan.innerText = "GRADE A (SIAP PANEN)";
                uiKeputusan.className = "text-xl font-black bg-green-500 text-white px-6 py-3 rounded";
            } else if (v >= 0.50) {
                uiKeputusan.innerText = "FASE PEMATANGAN";
                uiKeputusan.className = "text-xl font-black bg-blue-500 text-white px-6 py-3 rounded";
            } else {
                uiKeputusan.innerText = "PERLU INTERVENSI (AERASI)";
                uiKeputusan.className = "text-xl font-black bg-yellow-500 text-gray-900 px-6 py-3 rounded";
            }
        }

        function initToggleOverride() {
            let isOverrideActive = false;
            const btnOverride = document.getElementById('btn-override');

            btnOverride.addEventListener('click', () => {
                isOverrideActive = !isOverrideActive;

                set(ref(db, 'kontrol/aktuator'), {
                    kipas: isOverrideActive,
                    timestamp: Date.now()
                });

                if (isOverrideActive) {
                    btnOverride.innerText = "MATIKAN AERASI";
                    btnOverride.className = "bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-8 rounded transition-all";
                } else {
                    btnOverride.innerText = "EKSEKUSI AERASI";
                    btnOverride.className = "bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-8 rounded transition-all";
                }
            });
        }

        let tapCount = 0;
        let tapTimer;
        document.getElementById('secret-trigger').addEventListener('click', () => {
            tapCount++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 1500);

            if (tapCount === 3) {
                const panel = document.getElementById('override-panel');
                panel.classList.toggle('hidden');
                console.log("Sistem Intervensi Dimutasi.");
                tapCount = 0;
            }
        });
    </script>
</body>
</html>
